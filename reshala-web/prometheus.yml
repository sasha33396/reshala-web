global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: node_exporter
    http_sd_configs:
      - url: http://backend:3001/internal/prometheus-targets
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
